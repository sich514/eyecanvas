<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" width="1200" height="1200">
  <defs>
    <!-- Base radial gradient for the iris -->
    <radialGradient id="irisBase" cx="50%" cy="48%" r="50%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="18%" stop-color="#0a0a0a"/>
      <stop offset="19%" stop-color="#1a2a1a"/>
      <stop offset="30%" stop-color="#2d5a2d"/>
      <stop offset="45%" stop-color="#4a7c3f"/>
      <stop offset="58%" stop-color="#7a6020"/>
      <stop offset="72%" stop-color="#C8883A"/>
      <stop offset="84%" stop-color="#a06828"/>
      <stop offset="92%" stop-color="#6b4415"/>
      <stop offset="100%" stop-color="#1a0a00"/>
    </radialGradient>

    <!-- Pupil gradient -->
    <radialGradient id="pupil" cx="48%" cy="46%" r="50%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="60%" stop-color="#080808"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>

    <!-- Specular highlight on pupil -->
    <radialGradient id="specular" cx="35%" cy="32%" r="50%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.85)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>

    <!-- Limbal ring -->
    <radialGradient id="limbal" cx="50%" cy="50%" r="50%">
      <stop offset="80%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="94%" stop-color="rgba(0,0,0,0.7)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.95)"/>
    </radialGradient>

    <!-- Texture filter -->
    <filter id="irisTexture" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65 0.65" numOctaves="4" seed="2" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="overlay" result="blend"/>
      <feGaussianBlur stdDeviation="0.3" in="blend" result="blur"/>
      <feComposite in="blur" in2="SourceGraphic" operator="in"/>
    </filter>

    <filter id="glowFilter">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3"/>
    </filter>

    <clipPath id="irisClip">
      <circle cx="600" cy="600" r="460"/>
    </clipPath>
    <clipPath id="pupilClip">
      <circle cx="600" cy="595" r="175"/>
    </clipPath>
  </defs>

  <!-- Black background -->
  <rect width="1200" height="1200" fill="#050505"/>

  <!-- Subtle sclera glow -->
  <ellipse cx="600" cy="605" rx="550" ry="470" fill="#fff" opacity="0.04"/>

  <!-- Main iris base -->
  <circle cx="600" cy="600" r="460" fill="url(#irisBase)"/>

  <!-- Iris fiber layers - amber zone -->
  <g clip-path="url(#irisClip)" opacity="0.85">
    <!-- Radial fibers outer amber zone -->
    <g stroke="#d4922a" stroke-width="1.2" opacity="0.5">
      <line x1="600" y1="600" x2="1045" y2="485"/>
      <line x1="600" y1="600" x2="1050" y2="540"/>
      <line x1="600" y1="600" x2="1048" y2="600"/>
      <line x1="600" y1="600" x2="1040" y2="660"/>
      <line x1="600" y1="600" x2="1020" y2="718"/>
      <line x1="600" y1="600" x2="988" y2="768"/>
      <line x1="600" y1="600" x2="946" y2="812"/>
      <line x1="600" y1="600" x2="896" y2="848"/>
      <line x1="600" y1="600" x2="840" y2="878"/>
      <line x1="600" y1="600" x2="778" y2="900"/>
      <line x1="600" y1="600" x2="712" y2="912"/>
      <line x1="600" y1="600" x2="645" y2="1058"/>
      <line x1="600" y1="600" x2="575" y2="1058"/>
      <line x1="600" y1="600" x2="508" y2="1046"/>
      <line x1="600" y1="600" x2="444" y2="1022"/>
      <line x1="600" y1="600" x2="385" y2="986"/>
      <line x1="600" y1="600" x2="334" y2="940"/>
      <line x1="600" y1="600" x2="288" y2="886"/>
      <line x1="600" y1="600" x2="250" y2="825"/>
      <line x1="600" y1="600" x2="220" y2="758"/>
      <line x1="600" y1="600" x2="200" y2="688"/>
      <line x1="600" y1="600" x2="152" y2="600"/>
      <line x1="600" y1="600" x2="160" y2="528"/>
      <line x1="600" y1="600" x2="182" y2="460"/>
      <line x1="600" y1="600" x2="220" y2="396"/>
      <line x1="600" y1="600" x2="272" y2="340"/>
      <line x1="600" y1="600" x2="336" y2="294"/>
      <line x1="600" y1="600" x2="408" y2="260"/>
      <line x1="600" y1="600" x2="488" y2="240"/>
      <line x1="600" y1="600" x2="570" y2="142"/>
      <line x1="600" y1="600" x2="650" y2="142"/>
      <line x1="600" y1="600" x2="728" y2="152"/>
      <line x1="600" y1="600" x2="804" y2="178"/>
      <line x1="600" y1="600" x2="874" y2="220"/>
      <line x1="600" y1="600" x2="936" y2="274"/>
      <line x1="600" y1="600" x2="990" y2="338"/>
      <line x1="600" y1="600" x2="1028" y2="410"/>
      <line x1="600" y1="600" x2="1050" y2="490"/>
    </g>

    <!-- Amber crypts -->
    <g fill="none" stroke="#e8a040" stroke-width="0.8" opacity="0.4">
      <ellipse cx="720" cy="520" rx="22" ry="10" transform="rotate(-30 720 520)"/>
      <ellipse cx="680" cy="480" rx="18" ry="8" transform="rotate(15 680 480)"/>
      <ellipse cx="490" cy="510" rx="20" ry="9" transform="rotate(40 490 510)"/>
      <ellipse cx="460" cy="560" rx="16" ry="7" transform="rotate(-20 460 560)"/>
      <ellipse cx="510" cy="700" rx="19" ry="8" transform="rotate(50 510 700)"/>
      <ellipse cx="700" cy="710" rx="21" ry="9" transform="rotate(-40 700 710)"/>
      <ellipse cx="730" cy="650" rx="17" ry="7" transform="rotate(25 730 650)"/>
      <ellipse cx="820" cy="590" rx="20" ry="8" transform="rotate(-15 820 590)"/>
    </g>

    <!-- Green zone fibers -->
    <g stroke="#3d7a30" stroke-width="1" opacity="0.6">
      <line x1="600" y1="600" x2="750" y2="440"/>
      <line x1="600" y1="600" x2="795" y2="478"/>
      <line x1="600" y1="600" x2="826" y2="528"/>
      <line x1="600" y1="600" x2="840" y2="588"/>
      <line x1="600" y1="600" x2="830" y2="648"/>
      <line x1="600" y1="600" x2="802" y2="700"/>
      <line x1="600" y1="600" x2="758" y2="742"/>
      <line x1="600" y1="600" x2="702" y2="766"/>
      <line x1="600" y1="600" x2="640" y2="776"/>
      <line x1="600" y1="600" x2="574" y2="770"/>
      <line x1="600" y1="600" x2="512" y2="748"/>
      <line x1="600" y1="600" x2="458" y2="710"/>
      <line x1="600" y1="600" x2="416" y2="660"/>
      <line x1="600" y1="600" x2="390" y2="600"/>
      <line x1="600" y1="600" x2="382" y2="536"/>
      <line x1="600" y1="600" x2="398" y2="472"/>
      <line x1="600" y1="600" x2="434" y2="420"/>
      <line x1="600" y1="600" x2="484" y2="382"/>
      <line x1="600" y1="600" x2="545" y2="360"/>
      <line x1="600" y1="600" x2="610" y2="356"/>
      <line x1="600" y1="600" x2="674" y2="366"/>
      <line x1="600" y1="600" x2="728" y2="390"/>
    </g>

    <!-- Collarette ring -->
    <circle cx="600" cy="600" r="230" fill="none" stroke="#b87830" stroke-width="2.5" opacity="0.6"/>
    <circle cx="600" cy="600" r="232" fill="none" stroke="#e8a040" stroke-width="0.8" opacity="0.3"/>
    <circle cx="600" cy="600" r="228" fill="none" stroke="#8B5E2A" stroke-width="1" opacity="0.4"/>

    <!-- Texture overlay -->
    <circle cx="600" cy="600" r="460" fill="url(#irisBase)" opacity="0.15"/>
  </g>

  <!-- Limbal ring (dark outer edge) -->
  <circle cx="600" cy="600" r="460" fill="url(#limbal)"/>

  <!-- Pupil -->
  <circle cx="600" cy="595" r="175" fill="url(#pupil)"/>

  <!-- Pupil inner depth -->
  <circle cx="600" cy="595" r="165" fill="#020208" opacity="0.9"/>
  <circle cx="600" cy="595" r="150" fill="#000005"/>

  <!-- Pupil edge softening -->
  <circle cx="600" cy="595" r="175" fill="none" stroke="#1a1a3a" stroke-width="8" opacity="0.5"/>

  <!-- Main specular highlight (top-left of pupil) -->
  <ellipse cx="545" cy="535" rx="48" ry="36" fill="url(#specular)" opacity="0.9"/>

  <!-- Secondary soft highlight -->
  <ellipse cx="650" cy="655" rx="18" ry="12" fill="rgba(255,255,255,0.12)" transform="rotate(-20 650 655)"/>

  <!-- Amber glow ring around pupil -->
  <circle cx="600" cy="595" r="178" fill="none" stroke="#C8883A" stroke-width="3" opacity="0.35"/>
  <circle cx="600" cy="595" r="185" fill="none" stroke="#d4922a" stroke-width="1" opacity="0.2"/>

  <!-- Fine texture over everything -->
  <circle cx="600" cy="600" r="460" fill="url(#irisBase)" opacity="0.08" filter="url(#irisTexture)"/>
</svg>
